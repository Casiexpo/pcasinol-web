<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>POL CASIÑOL EXPOSITO</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Orbitron', sans-serif;
      background-color: black;
      color: rgb(255, 0, 0);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    h1 {
      font-size: 3em;
      text-shadow: 0 0 15px rgb(255, 0, 0);
      z-index: 2;
      margin-bottom: 20px;
    }

    h2 {
      font-size: 2em;
      color: rgb(255, 0, 0);
      text-shadow: 0 0 10px rgb(255, 0, 0);
      z-index: 2;
      margin-bottom: 30px;
    }

    .video-container {
      position: relative;
      z-index: 2;
      width: 90%;
      max-width: 800px;
    }

    iframe {
      width: 100%;
      aspect-ratio: 16 / 9;
      border: 4px solid rgb(255, 0, 0);
      border-radius: 12px;
      box-shadow: 0 0 20px rgb(255, 0, 0);
      transition: transform 0.3s ease;
    }

    iframe:hover {
      transform: scale(1.02);
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }
  </style>
</head>
<body>
  <canvas id="matrixCanvas"></canvas>

  <h1>POL CASIÑOL EXPOSITO</h1>
  <h2 id="contador"></h2>

  <div class="video-container">
    <iframe src="https://www.youtube.com/embed/jZL5vLo1Ifg" allowfullscreen></iframe>
  </div>

  <script>
    const canvas = document.getElementById('matrixCanvas');
    const ctx = canvas.getContext('2d');

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();

    const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ1234567890*#¿?&!¡';
    const matrix = letters.split('');
    const fontSize = 16;
    const columns = Math.floor(canvas.width / fontSize);
    const drops = Array(columns).fill(0);

    function drawMatrix() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = 'rgb(255, 0, 0)';
      ctx.font = `${fontSize}px monospace`;

      for (let i = 0; i < drops.length; i++) {
        const text = matrix[Math.floor(Math.random() * matrix.length)];
        const x = i * fontSize;
        const y = drops[i] * fontSize;
        ctx.fillText(text, x, y);

        if (y > canvas.height && Math.random() > 0.975) {
          drops[i] = 0;
        }
        drops[i]++;
      }
    }

    setInterval(drawMatrix, 50);
    window.addEventListener('resize', resizeCanvas);

    // CONTADOR
    const contador = document.getElementById('contador');
    const fechaFinal = new Date('2026-03-17T23:59:00');

    function actualizarContador() {
      const ahora = new Date();
      const diferencia = fechaFinal - ahora;

      if (diferencia <= 0) {
        contador.innerHTML = "⛔ DOMINIO EXPIRADO";
        return;
      }

      const dias = Math.floor(diferencia / (1000 * 60 * 60 * 24));
      const horas = Math.floor((diferencia / (1000 * 60 * 60)) % 24);
      const minutos = Math.floor((diferencia / (1000 * 60)) % 60);
      const segundos = Math.floor((diferencia / 1000) % 60);

      contador.innerHTML = `${dias}d ${horas}h ${minutos}m ${segundos}s`;
    }

    setInterval(actualizarContador, 1000);
    actualizarContador();
  </script>
</body>
</html>
